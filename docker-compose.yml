version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: budgeting-postgres
    environment:
      POSTGRES_DB: budgeting
      POSTGRES_USER: budgeting
      POSTGRES_PASSWORD: budgeting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgeting -d budgeting"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: