# Server
server.port=8080

# Database (PostgreSQL for production, H2 for tests)
spring.datasource.url=jdbc:postgresql://localhost:5432/budgeting
spring.datasource.username=${DB_USERNAME:budgeting}
spring.datasource.password=${DB_PASSWORD:budgeting}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring AI - OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.chat.temperature=0.7
spring.ai.openai.audio.transcription.model=whisper-1
spring.ai.openai.audio.speech.model=tts-1
spring.ai.openai.audio.speech.voice=alloy

# Spring AI - Chat Client
spring.ai.chat.client.enabled=true

# Logging
logging.level.org.springframework.ai=DEBUG
logging.level.dio.budgeting=DEBUG