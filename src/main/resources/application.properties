# Server
server.port=8080

# Database (H2 in-memory for dev, PostgreSQL for production with 'prod' profile)
spring.datasource.url=jdbc:h2:mem:budgeting;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Spring AI - OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.chat.temperature=0.7
spring.ai.openai.audio.transcription.model=whisper-1
spring.ai.openai.audio.speech.model=tts-1
spring.ai.openai.audio.speech.voice=alloy

# Spring AI - Chat Client
spring.ai.chat.client.enabled=true

# Logging
logging.level.org.springframework.ai=DEBUG
logging.level.dio.budgeting=DEBUG